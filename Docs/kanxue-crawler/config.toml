# 抓取目标白名单。把不想抓的版块注释掉即可。
# fid 通过浏览器访问 https://bbs.kanxue.com/list.htm 后查看每个版块的链接 forum-{fid}.htm 获得。

[network]
# 单次请求间随机 sleep 区间 (秒)。温和提速：4~10s（每页阅读 3~7 秒还是合理的人类节奏）
min_delay = 4.0
max_delay = 10.0
# 每抓完一个帖子额外停 (秒)。10~25s（看完短文翻下一篇的节奏）
post_thread_min_delay = 10.0
post_thread_max_delay = 25.0
# 每天的硬性请求上限。提到 2000 → 大约 500~700 帖/天的容量
daily_request_cap = 2000
# 单次会话最多抓多少帖（不指定 --limit 时的默认值）。提到 150
session_thread_cap = 150
# 超时
timeout = 30
# 失败重试
max_retries = 4

[paths]
output_dir = "output"
state_dir  = "state"
cookies    = "state/cookies.json"

